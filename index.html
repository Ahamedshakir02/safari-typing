<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- SPA deep-link restore (GitHub Pages 404.html redirect technique). Harmless
         on hosts that already rewrite to index.html (Netlify/Vercel). -->
    <script>
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) { return s.replace(/~and~/g, '&') })
            .join('?')
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash)
        }
      })(window.location)
    </script>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="any" />
    <meta name="theme-color" content="#f1eadd" />

    <title>Safari Typing Services — Typing Centre in Ajman, UAE</title>
    <meta
      name="description"
      content="Government paperwork handled with quiet care in Ajman — visas, Emirates ID, Tasheel, Amer, attestation, business licences and PRO services. Nazir Plaza, Shop 4, Ajman, UAE."
    />

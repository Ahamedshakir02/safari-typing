<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- SPA deep-link restore (GitHub Pages 404.html redirect technique). Harmless
         on hosts that already rewrite to index.html (Netlify/Vercel). -->
    <script>
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) { return s.replace(/~and~/g, '&') })
            .join('?')
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash)
        }
      })(window.location)
    </script>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="any" />
    <meta name="theme-color" content="#f1eadd" />

    <!-- Per-route <head> — title, description, canonical, Open Graph, Twitter
         cards and JSON-LD — is rendered by src/components/Seo.jsx through
         vite-react-ssg's <Head> and prerendered into each route's static HTML. -->

    <!-- Fonts: EB Garamond (display serif) + Figtree (body) per the brand design. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Figtree:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Analytics (privacy-friendly, cookieless). NOTE: the Plausible property for
         safaritypingservices.com must be created in the Plausible dashboard for
         data to record. Swap for GA4 here if preferred. -->
    <script defer data-domain="safaritypingservices.com" src="https://plausible.io/js/script.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
